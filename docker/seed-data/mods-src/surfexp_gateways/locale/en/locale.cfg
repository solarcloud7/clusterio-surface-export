[item-name]
selection-lab-tool=Selection Lab

[item-description]
selection-lab-tool=Copy/paste a factory chunk WITH all contents through the real surface-export pipeline (debug tool).\n[color=blue]Drag[/color] - COPY the selection (entities, belt items, inventories, fluids, state)\n[color=green]Shift + Drag[/color] - PASTE, all-or-nothing: refuses if ANY entity target is occupied (conflicts red + error sound)\n[color=orange]Ctrl + Drag[/color] - AUDIT: counts the selection with the transfer gate's own meters (items/entities/fluids + delta vs last audit)\n[color=red]Ctrl + Shift + Drag[/color] - FORCE paste: replaces blockers (never characters, hubs, other forces); fully undoable\n[color=yellow]Ctrl + Shift + Z / Y[/color] - UNDO / REDO the last paste (blockers come back with contents)\nSame surface only. No wire reconnection or rotation. Requires debug_mode.

[shortcut-name]
selection-lab-tool=Selection Lab

[controls]
selection-lab-undo=Selection Lab: undo paste
selection-lab-redo=Selection Lab: redo paste
