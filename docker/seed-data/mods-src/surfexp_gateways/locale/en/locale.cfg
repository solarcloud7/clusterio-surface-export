[item-description]
selection-lab-tool=Copy/paste a factory chunk WITH all contents through the real surface-export pipeline (debug tool).\n[color=blue]Drag[/color] - COPY the selection (entities, belt items, inventories, fluids, state)\n[color=green]Shift + Drag[/color] - PASTE at the target (conflicts skipped and highlighted red)\n[color=orange]Ctrl + Drag[/color] - PREVIEW the paste footprint (red = would conflict)\n[color=red]Ctrl + Shift + Drag[/color] - FORCE paste (destroys your own blocking entities; never characters, hubs, or other forces)\nSame surface only. No wire reconnection or rotation. Requires debug_mode.

