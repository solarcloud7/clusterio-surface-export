name: CI — Test & Publish

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

# Cancel in-progress runs for the same ref (branch/PR)
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PLUGIN_DIR: docker/seed-data/external_plugins/surface_export
  # Layer the CI override onto the base compose so every `docker compose` command uses the
  # host image with Factorio headless baked in (docker-compose.ci.yml).
  COMPOSE_FILE: docker-compose.yml:docker-compose.ci.yml

jobs:
  # ===========================================================================
  # Integration Tests — spin up the full Docker cluster and run both test suites
  # ===========================================================================
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          # Full history: the commit-label guard diffs origin/<base>..HEAD per commit.
          fetch-depth: 0

      # Commit labels are audit boundaries — a docs(...) commit must not carry code (twice-paid
      # incident: a mislabeled rider evades review attention). PR-only: push-to-main ranges are empty.
      - name: Commit-label audit boundaries
        if: github.event_name == 'pull_request'
        env:
          BASE_REF: ${{ github.base_ref }}
        run: node ${{ env.PLUGIN_DIR }}/scripts/lint-commit-labels.mjs
      - name: Brief execution-discipline link
        if: github.event_name == 'pull_request'
        env:
          BASE_REF: ${{ github.base_ref }}
        run: node ${{ env.PLUGIN_DIR }}/scripts/lint-brief-discipline.mjs

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: ${{ env.PLUGIN_DIR }}/package-lock.json

      - name: Build plugin
        working-directory: ${{ env.PLUGIN_DIR }}
        run: |
          npm ci
          npm run build

      - name: Lint (TS Link-method binding guard + Lua invariant guard)
        working-directory: ${{ env.PLUGIN_DIR }}
        run: npm run lint

      - name: Test (message round-trip + wire contract)
        working-directory: ${{ env.PLUGIN_DIR }}
        run: npm test

      - name: Create env file from example
        run: |
          cp .env.example .env
          # Set required values for CI
          sed -i 's/^INIT_CLUSTERIO_ADMIN=$/INIT_CLUSTERIO_ADMIN=ci-admin/' .env

      - name: Resolve & verify pinned Factorio version
        id: factorio_version
        run: |
          # Single source of truth = host-1 instance.json's factorio.version. We bake exactly that
          # version (FACTORIO_HEADLESS_TAG) so Clusterio finds it present and neither re-downloads
          # nor fails findVersion(). host-2's instance.json and the Dockerfile fallback default MUST
          # match it — a mismatch breaks the "one version, one place" invariant, so fail loudly
          # instead of baking the wrong version.
          read_ver() {
            grep -oE '"factorio\.version"[^"]*"[0-9]+\.[0-9]+\.[0-9]+"' "$1" \
              | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' | head -1
          }
          H1=docker/seed-data/hosts/clusterio-host-1/clusterio-host-1-instance-1/instance.json
          H2=docker/seed-data/hosts/clusterio-host-2/clusterio-host-2-instance-1/instance.json
          DF=docker/ci/Dockerfile.factorio-baked
          # Best-effort extraction: a grep no-match (exit 1, propagated by pipefail) must NOT abort
          # the step under `set -e` before the explicit `test -n` checks below can emit a clear
          # ::error::. Let each assignment yield empty on failure; the checks are the real gate.
          v=$(read_ver "$H1")  || true
          v2=$(read_ver "$H2") || true
          vdf=$(grep -oE 'FACTORIO_HEADLESS_TAG=[0-9]+\.[0-9]+\.[0-9]+' "$DF" | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' | head -1) || true
          test -n "$v"   || { echo "::error::could not resolve factorio.version from $H1"; exit 1; }
          test -n "$v2"  || { echo "::error::could not resolve factorio.version from $H2"; exit 1; }
          test -n "$vdf" || { echo "::error::could not resolve FACTORIO_HEADLESS_TAG default from $DF"; exit 1; }
          if [ "$v" != "$v2" ] || [ "$v" != "$vdf" ]; then
            echo "::error::Factorio version mismatch — single source host-1=$v disagrees with host-2=$v2 and/or Dockerfile default=$vdf. Set all three to the same version."
            exit 1
          fi
          echo "version=$v" >> "$GITHUB_OUTPUT"
          echo "Pinned Factorio version (verified consistent across host-1/host-2/Dockerfile): $v"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build Factorio-baked host image (layer-cached)
        # Bakes the headless server onto the public host image so instances don't download
        # Factorio at runtime. The build layer is cached across runs via GitHub Actions cache,
        # so the Factorio download happens at most once per cache lifetime. `load` makes the
        # image available to the local Docker daemon for `docker compose`.
        uses: docker/build-push-action@v7
        with:
          context: docker/ci
          file: docker/ci/Dockerfile.factorio-baked
          tags: clusterio-docker-host:factorio-baked
          load: true
          cache-from: type=gha,scope=factorio-headless
          cache-to: type=gha,mode=max,scope=factorio-headless
          build-args: |
            HOST_IMAGE=ghcr.io/solarcloud7/clusterio-docker-host:2.0.0-alpha.25
            FACTORIO_HEADLESS_TAG=${{ steps.factorio_version.outputs.version }}

      - name: Create external factorio-client volume
        run: |
          # docker-compose declares `factorio-client` as an external volume (shared across
          # projects in local dev). CI has no Factorio credentials, so host-1 falls back to
          # headless mode (auto-downloads the headless server) — but compose still mounts the
          # volume, so it must exist or `up` fails with "external volume not found".
          docker volume create factorio-client

      - name: Pull Docker images
        run: |
          docker compose pull

      - name: Start cluster
        run: |
          docker compose up -d
          echo "Waiting for cluster to be healthy..."
          # Wait for controller health check (up to 120s)
          timeout 120 bash -c '
            until docker inspect --format="{{.State.Health.Status}}" surface-export-controller 2>/dev/null | grep -q healthy; do
              sleep 5
              echo "  Waiting for controller..."
            done
          '
          echo "Controller is healthy"

      - name: Wait for instances to start
        run: |
          CTL="docker exec surface-export-controller npx clusterioctl --config=/clusterio/tokens/config-control.json"

          # Phase 1: wait until BOTH instances are created & assigned. Seeding runs inside the
          # controller entrypoint and can still be in flight after the controller health check
          # passes, so the instances may not be in `instance list` yet. Waiting here decouples us
          # from the seed script's own (racy) per-instance start.
          echo "Waiting for both instances to be created & assigned..."
          if ! timeout 60 bash -c '
            until [ "$(docker exec surface-export-controller npx clusterioctl \
                       --config=/clusterio/tokens/config-control.json --log-level error instance list 2>/dev/null \
                       | grep -cE "clusterio-host-[12]-instance-1")" -ge 2 ]; do
              echo "  instances not all present yet; current list:"
              docker exec surface-export-controller npx clusterioctl \
                --config=/clusterio/tokens/config-control.json instance list 2>&1 | sed "s/^/    /" || true
              sleep 4
            done
          '; then
            echo "::error::Instances were never created/assigned (seeding did not complete) — see 'Collect logs on failure'"
            $CTL instance list 2>&1 || true
            exit 1
          fi
          echo "Both instances are present."

          # Phase 2: explicitly start them, retrying until both report running. The base image's
          # seed fires `instance start` right after `instance assign`, before the host has created
          # the instance dir, and swallows the failure with `|| true` — so an instance can silently
          # stay `stopped`. `instance start-all` is the reliable, retryable equivalent: it (re)starts
          # every `stopped` instance and is a no-op for running ones, so looping it converges. With
          # the baked image there's no Factorio download, so starts complete in seconds.
          echo "Driving 'instance start-all' until both instances report running..."
          if ! timeout 90 bash -c '
            until [ "$(docker exec surface-export-controller npx clusterioctl \
                       --config=/clusterio/tokens/config-control.json --log-level error instance list 2>/dev/null \
                       | grep -E "clusterio-host-[12]-instance-1" | grep -c "running")" -ge 2 ]; do
              echo "  start-all (starts any stopped instances):"
              docker exec surface-export-controller npx clusterioctl \
                --config=/clusterio/tokens/config-control.json instance start-all 2>&1 | sed "s/^/    /" || true
              echo "  current state:"
              docker exec surface-export-controller npx clusterioctl \
                --config=/clusterio/tokens/config-control.json instance list 2>&1 | sed "s/^/    /" || true
              sleep 8
            done
          '; then
            echo "::error::Instances did not reach running after start-all — see 'Collect logs on failure'"
            $CTL instance list 2>&1 || true
            exit 1
          fi
          echo "Both instances are running"

          # `running` means the Factorio process exists, not that RCON or the save-patched module is ready.
          # Require an exact sentinel from both instances before any integration probe can send RCON.
          echo "Waiting for RCON and the surface_export module on both instances..."
          READY_COMMAND='/sc rcon.print(remote.interfaces["surface_export"] and "ci-plugin-ready" or "ci-plugin-missing")'
          READY_DEADLINE=$((SECONDS + 90))
          READY_INSTANCES=(clusterio-host-1-instance-1 clusterio-host-2-instance-1)
          declare -A LAST_READY_OUTPUT
          while true; do
            ALL_READY=true
            for instance in "${READY_INSTANCES[@]}"; do
              response="$($CTL --log-level error instance send-rcon "$instance" "$READY_COMMAND" 2>&1 || true)"
              response="$(printf '%s' "$response" | tr -d '\r' | sed '/^[[:space:]]*$/d')"
              LAST_READY_OUTPUT["$instance"]="$response"
              if [ "$response" = "ci-plugin-ready" ]; then
                echo "  $instance: ci-plugin-ready"
              else
                ALL_READY=false
                echo "  $instance: not ready (response=${response:-<empty>})"
              fi
            done
            if [ "$ALL_READY" = true ]; then
              break
            fi
            if [ "$SECONDS" -ge "$READY_DEADLINE" ]; then
              echo "::error::RCON/plugin readiness did not converge within 90s — see 'Collect logs on failure'"
              $CTL instance list 2>&1 || true
              for instance in "${READY_INSTANCES[@]}"; do
                echo "  last response from $instance: ${LAST_READY_OUTPUT[$instance]:-<empty>}"
              done
              exit 1
            fi
            sleep 3
          done
          echo "Both instances are RCON/plugin ready"
          $CTL instance list

      # One auto-discovering runner over tests/integration/*/run-tests.{ps1,mjs} — the dir set is the single
      # source of truth, so adding a test dir auto-wires it here (no per-test step to maintain; this replaced
      # ~13 hand-listed steps that had already drifted — version-dispatch/name-collision-delete were missing).
      # Node spawns pwsh for the .ps1 tests (ubuntu-latest ships both); each test's output folds under
      # ::group:: in the log. Runs everything, then fails the job if any test failed.
      - name: Run integration suite
        run: node tools/run-integration-tests.mjs

      - name: Collect logs on failure
        if: failure()
        run: |
          # Surface the start-failure reason first. The most common opaque failure is the host
          # rejecting an instance before Factorio launches (e.g. Clusterio's findVersion()
          # throwing "Unable to find Factorio version X" when the baked/installed version does
          # not match the instance's pinned factorio.version) — that throw lands in the HOST
          # log, NOT factorio-current.log (which stays empty). Earlier runs truncated it with
          # `--tail 100`; we now grep the FULL host logs for it and dump instance status.
          echo "=== Instance status (look for 'errored'/'stopped' + the reason) ==="
          docker exec surface-export-controller \
            npx clusterioctl --config=/clusterio/tokens/config-control.json instance list 2>&1 || true
          echo ""
          echo "=== Highlighted errors across host logs (usual smoking gun) ==="
          for h in host-1 host-2; do
            echo "--- surface-export-$h ---"
            docker logs "surface-export-$h" 2>&1 \
              | grep -iE "error|unable to find|exception|fatal|cannot|failed to|not found|throw|traceback" \
              | tail -40 || true
          done
          echo ""
          echo "=== Controller Logs (tail 500) ==="
          docker logs surface-export-controller --tail 500 2>&1 || true
          echo ""
          echo "=== Host 1 Logs (tail 500) ==="
          docker logs surface-export-host-1 --tail 500 2>&1 || true
          echo ""
          echo "=== Host 2 Logs (tail 500) ==="
          docker logs surface-export-host-2 --tail 500 2>&1 || true
          echo ""
          echo "=== Host 1 Factorio Log (empty => Factorio never launched; see host log above) ==="
          docker exec surface-export-host-1 cat /clusterio/data/instances/clusterio-host-1-instance-1/factorio-current.log 2>/dev/null | tail -200 || true
          echo ""
          echo "=== Host 2 Factorio Log ==="
          docker exec surface-export-host-2 cat /clusterio/data/instances/clusterio-host-2-instance-1/factorio-current.log 2>/dev/null | tail -200 || true

      - name: Capture failing repro (payload + save) for local debugging
        if: failure()
        run: |
          # The busy held-item loss only reproduces in CI's platform state. Capture the re-importable payload
          # (debug_source_platform_*.json = the serialized clone the transfer imports) and the host-2 save
          # (failed dest left deactivated on gate failure) so we can repro + interrogate the failing inserters
          # locally instead of guessing via 4-minute CI pushes. See plan / tests/inserter-lab/NOTEBOOK.md.
          mkdir -p ci-artifacts/host1-script-output ci-artifacts/host2-script-output ci-artifacts/host2-saves
          docker cp surface-export-host-1:/clusterio/data/instances/clusterio-host-1-instance-1/script-output/. ci-artifacts/host1-script-output/ 2>/dev/null || true
          docker cp surface-export-host-2:/clusterio/data/instances/clusterio-host-2-instance-1/script-output/. ci-artifacts/host2-script-output/ 2>/dev/null || true
          # Stop host-2 to flush the failed destination. `instance stop` can return before the save's
          # .tmp.zip is atomically renamed, so track the exact active save rather than an autosave/newest zip.
          HOST2=surface-export-host-2
          ACTIVE_SAVE_PATH="$(docker exec "$HOST2" sh -c '
            log=/clusterio/data/instances/clusterio-host-2-instance-1/factorio-current.log
            line=$(grep -m1 -- "--start-server" "$log" 2>/dev/null || true)
            printf "%s\n" "$line" | sed -n "s#.*\(/clusterio/data/instances/[^\"]*/saves/[^\"]*\.zip\)\".*#\1#p"
          ' 2>/dev/null || true)"
          ACTIVE_SAVE_PATH="$(printf '%s' "$ACTIVE_SAVE_PATH" | tr -d '\r\n')"
          BEFORE_STAT=absent
          TMP_SAVE_PATH=
          if [ -n "$ACTIVE_SAVE_PATH" ]; then
            BEFORE_STAT="$(docker exec "$HOST2" stat -c '%Y|%s|%i' "$ACTIVE_SAVE_PATH" 2>/dev/null || true)"
            [ -n "$BEFORE_STAT" ] || BEFORE_STAT=absent
            TMP_SAVE_PATH="${ACTIVE_SAVE_PATH%.zip}.tmp.zip"
            echo "Active host-2 save: $ACTIVE_SAVE_PATH (before=$BEFORE_STAT)"
          else
            echo "::warning::Could not resolve host-2's active save from factorio-current.log; skipping flush poll and copying any saves that exist"
          fi

          docker exec surface-export-controller sh -c 'npx clusterioctl --config /clusterio/tokens/config-control.json instance stop clusterio-host-2-instance-1' 2>&1 || true

          OBSERVED_INCOMPLETE_AFTER_STOP=false
          FINAL_STAT=absent
          FINAL_TMP=unknown
          if [ -n "$ACTIVE_SAVE_PATH" ]; then
            FLUSH_DEADLINE=$((SECONDS + 60))
            while true; do
              FINAL_STAT="$(docker exec "$HOST2" stat -c '%Y|%s|%i' "$ACTIVE_SAVE_PATH" 2>/dev/null || true)"
              [ -n "$FINAL_STAT" ] || FINAL_STAT=absent
              if docker exec "$HOST2" test -e "$TMP_SAVE_PATH" 2>/dev/null; then FINAL_TMP=true; else FINAL_TMP=false; fi
              IFS='|' read -r before_mtime _ before_inode <<< "${BEFORE_STAT//absent/0|0|0}"
              IFS='|' read -r final_mtime final_size final_inode <<< "${FINAL_STAT//absent/0|0|0}"
              if [ "$FINAL_TMP" = false ] \
                && [ "${final_mtime:-0}" -gt "${before_mtime:-0}" ] \
                && [ "${final_inode:-0}" -ne "${before_inode:-0}" ] \
                && [ "${final_size:-0}" -gt 0 ]; then
                echo "save-flush complete path=$ACTIVE_SAVE_PATH before=$BEFORE_STAT after=$FINAL_STAT tmp=$FINAL_TMP observed_incomplete_after_stop=$OBSERVED_INCOMPLETE_AFTER_STOP"
                break
              fi
              OBSERVED_INCOMPLETE_AFTER_STOP=true
              if [ "$SECONDS" -ge "$FLUSH_DEADLINE" ]; then
                echo "::warning::Save flush did not complete within 60s; captured save may be stale or truncated. path=$ACTIVE_SAVE_PATH before=$BEFORE_STAT final=$FINAL_STAT tmp_exists=$FINAL_TMP"
                break
              fi
              sleep 2
            done
          fi

          docker cp surface-export-host-2:/clusterio/data/instances/clusterio-host-2-instance-1/saves/. ci-artifacts/host2-saves/ 2>/dev/null || true
          FOUND_SAVE=false
          while IFS= read -r save; do
            FOUND_SAVE=true
            if unzip -t "$save" >/dev/null 2>&1; then
              echo "save-zip valid: $save"
            else
              echo "::warning::Captured save is not unzip-valid: $save"
            fi
          done < <(find ci-artifacts/host2-saves -maxdepth 1 -type f -name '*.zip' -print 2>/dev/null)
          if [ "$FOUND_SAVE" = false ]; then
            echo "::warning::No host-2 save zip was captured"
          fi
          echo "=== captured artifact sizes ===" ; du -sh ci-artifacts/* 2>/dev/null || true
          find ci-artifacts/host1-script-output -maxdepth 1 -type f -iname '*debug_source*' -printf '%f\n' 2>/dev/null || true

      - name: Upload failing repro artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: failing-repro
          path: ci-artifacts/
          retention-days: 5
          if-no-files-found: warn

      - name: Stop cluster
        if: always()
        run: |
          docker compose down -v

  # ===========================================================================
  # Publish to npm — only on version tags after tests pass
  # ===========================================================================
  publish:
    name: Publish to npm
    needs: integration-tests
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    timeout-minutes: 5

    permissions:
      contents: read
      id-token: write  # For npm provenance

    environment: npm-publish

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'
          cache-dependency-path: ${{ env.PLUGIN_DIR }}/package-lock.json

      - name: Install dependencies
        working-directory: ${{ env.PLUGIN_DIR }}
        run: npm ci

      - name: Build plugin
        working-directory: ${{ env.PLUGIN_DIR }}
        run: npm run build

      - name: Verify version matches tag
        working-directory: ${{ env.PLUGIN_DIR }}
        run: |
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          echo "Package version: $PACKAGE_VERSION"
          echo "Tag version:     $TAG_VERSION"
          if [ "$PACKAGE_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::Version mismatch! package.json=$PACKAGE_VERSION, tag=$TAG_VERSION"
            exit 1
          fi

      - name: Publish to npm
        working-directory: ${{ env.PLUGIN_DIR }}
        run: npm publish --provenance --access public
